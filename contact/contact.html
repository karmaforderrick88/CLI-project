<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email us</title>
    <link rel="stylesheet" href="../index.css">  
    <link rel="stylesheet" href="contact.css">   
    <script src="https://kit.fontawesome.com/4822a6e79c.js" crossorigin="anonymous"></script>
</head>
<body>
    <nav class="navbar">
        <div class="logo">FINE<span>TECH</span></div>
        <ul class="nav-links">
            <li><a href="../index.html">Home</a></li>
            <li><a href="../gallery/gallery.html">Gallery</a></li>
            <li><a href="../about/about.html">About Us</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
    
    <main id="form-body">
        <form id="contact-form">
            <label for="name">Enter your name:</label>
            <input name="name" class="form-input" id="name">
            
            <label for="email">Enter your email:</label>
            <input type="email" class="form-input" name="email" id="email">
            
            <textarea id="txtarea" name="message" rows="6" placeholder="Your message"></textarea>
            
            <button id="submitbtn" type="submit">Submit</button>
        </form>
        
        <section id="social-links">
            <a href="https://www.facebook.com/"><i class="fa-brands fa-facebook"></i></a>
            <a href="https://www.instagram.com/"><i class="fa-brands fa-instagram"></i></a>
            <a href="https://x.com"><i class="fa-brands fa-x-twitter"></i></a>
            <a href="https://www.linkedin.com"><i class="fa-brands fa-linkedin"></i></a>
        </section>
    </main>
    
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
        (function() {
            emailjs.init("Y_x4EKALuADWU6avq");
        })();
    </script>
    <script src="contact.js"></script>
</body>
</html>
